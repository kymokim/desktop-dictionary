spring.application.name=desktop-dictionary

logging.file.encoding=UTF-8
logging.console.encoding=UTF-8

#h2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.datasource.jdbc-url=jdbc:h2:tcp://localhost/~/test
spring.datasource.url=jdbc:h2:mem:test
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#MariaDB
#spring.jpa.hibernate.ddl-auto=update
#spring.datasource.url=${MARIADB_URL:jdbc:mariadb://localhost:3306/desktop-dictionary}
#spring.datasource.driverClassName=org.mariadb.jdbc.Driver
#spring.datasource.username=${MARIADB_USERNAME:root}
#spring.datasource.password=${MARIADB_PASSWORD:}

#Hibernate
spring.jpa.properties.hibernate.format_sql=true

#redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Payment
iamport.api_key=${IAMPORT_API_KEY:}
iamport.api_secret=${IAMPORT_API_SECRET:}

# Application
app.admin.email=${APP_ADMIN_EMAIL:admin@example.com}
app.admin.password=${APP_ADMIN_PASSWORD:change-me}
jwt.secret=${JWT_SECRET:replace-this-with-a-secure-jwt-secret-for-local-use}
app.mail.host=${APP_MAIL_HOST:smtp.gmail.com}
app.mail.port=${APP_MAIL_PORT:587}
app.mail.username=${APP_MAIL_USERNAME:}
app.mail.password=${APP_MAIL_PASSWORD:}
app.mail.from=${APP_MAIL_FROM:noreply@example.com}
app.image.upload-url=${APP_IMAGE_UPLOAD_URL:http://localhost:8081/img/upload}
app.image.display-url=${APP_IMAGE_DISPLAY_URL:http://localhost:8081/img/display}
